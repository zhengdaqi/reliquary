name: Example smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  example-smoke:
    name: examples/save_a_soul.py end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cryptography
        run: pip install cryptography
      - name: Run example end-to-end
        run: PYTHONPATH=. python3 examples/save_a_soul.py
